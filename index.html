<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EasyTips</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #ff4d6d;
    --accent2: #ff8fa3;
    --text: #f0f0f0;
    --muted: #666;
    --success: #4ade80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 16px;
    padding-bottom: 100px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: white;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
  }

  .chat-badge {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
  }

  .chat-badge span {
    color: var(--accent2);
    font-weight: 500;
  }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .upload-zone:active {
    border-color: var(--accent);
    background: rgba(255, 77, 109, 0.05);
  }

  .upload-zone.has-files {
    border-color: var(--accent);
    border-style: solid;
  }

  .upload-icon {
    font-size: 40px;
    margin-bottom: 10px;
  }

  .upload-text {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .upload-sub {
    font-size: 12px;
    color: var(--muted);
  }

  #fileInput {
    display: none;
  }

  /* Preview Grid */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 16px;
  }

  .preview-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface2);
  }

  .preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .preview-item .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    background: rgba(0,0,0,0.7);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    cursor: pointer;
    color: white;
    border: none;
  }

  .preview-item .blur-badge {
    position: absolute;
    bottom: 4px;
    left: 4px;
    background: rgba(255,77,109,0.9);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 9px;
    font-weight: 600;
    color: white;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .add-more {
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--surface2);
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }

  .add-more:active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Section */
  .section {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* Price Input */
  .price-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .price-input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    gap: 8px;
  }

  .price-icon {
    font-size: 18px;
  }

  .price-input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    width: 100%;
  }

  .price-currency {
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
  }

  /* Blur toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .toggle-label {
    font-size: 14px;
    font-weight: 500;
  }

  .toggle-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .toggle {
    width: 44px;
    height: 26px;
    background: var(--border);
    border-radius: 13px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle.on {
    background: var(--accent);
  }

  .toggle::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: transform 0.2s;
  }

  .toggle.on::after {
    transform: translateX(18px);
  }

  /* Blur strength */
  .blur-slider-row {
    margin-top: 8px;
    display: none;
  }

  .blur-slider-row.visible {
    display: block;
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type="range"] {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    -webkit-appearance: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  /* Caption */
  .caption-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    resize: none;
    min-height: 72px;
  }

  .caption-input::placeholder {
    color: var(--muted);
  }

  /* Send button */
  .send-btn {
    position: fixed;
    bottom: 16px;
    left: 16px;
    right: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: default;
  }

  .send-btn:not(:disabled):active {
    transform: scale(0.97);
    background: #e03055;
  }

  .send-btn .arrow {
    font-size: 18px;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--success);
    color: #000;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    transition: transform 0.3s;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* Empty state */
  .empty-hint {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .count-badge {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 700;
    margin-left: 6px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">ET</div>
  <div class="header-title">EasyTips</div>
  <div class="chat-badge" id="chatBadge">чат <span id="chatName">—</span></div>
</div>

<!-- Upload Zone -->
<div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
  <div class="upload-icon">📸</div>
  <div class="upload-text">Добавить фото или видео</div>
  <div class="upload-sub">Нажмите чтобы выбрать файлы</div>
</div>
<input type="file" id="fileInput" multiple accept="image/*,video/*">

<!-- Preview -->
<div class="preview-grid" id="previewGrid" style="display:none"></div>

<!-- Settings -->
<div class="section">
  <div class="section-label">Настройки контента</div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">🔒 Замылить превью</div>
      <div class="toggle-sub">Получатель увидит размытое фото</div>
    </div>
    <div class="toggle on" id="blurToggle" onclick="toggleBlur()"></div>
  </div>

  <div class="blur-slider-row visible" id="blurSliderRow">
    <div class="slider-label">
      <span>Размытие</span>
      <span id="blurVal">15px</span>
    </div>
    <input type="range" min="5" max="30" value="15" id="blurSlider"
      oninput="document.getElementById('blurVal').textContent = this.value + 'px'">
  </div>
</div>

<div class="section">
  <div class="section-label">Цена разблокировки ⭐</div>
  <div class="price-row">
    <div class="price-input-wrap">
      <span class="price-icon">⭐</span>
      <input type="number" class="price-input" id="priceInput"
        placeholder="0" min="1" max="10000" value="">
      <span class="price-currency">Telegram Stars</span>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-label">Подпись</div>
  <textarea class="caption-input" id="captionInput"
    placeholder="Добавьте подпись к контенту..."></textarea>
</div>

<button class="send-btn" id="sendBtn" disabled onclick="sendContent()">
  <span>Отправить в чат</span>
  <span class="arrow">→</span>
</button>

<div class="toast" id="toast">✓ Отправлено!</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // Читаем chat_id и admin_id из URL параметров
  const urlParams = new URLSearchParams(window.location.search);
  let targetChatId = urlParams.get('chat_id') || null;
  let adminId = urlParams.get('admin_id') || (tg?.initDataUnsafe?.user?.id) || null;

  // Адрес сервера бота — замените на ваш ngrok URL когда будет
  const BOT_SERVER = urlParams.get('server') || 'https://lip-remix-chug.ngrok-free.dev';

  if (targetChatId) {
    document.getElementById('chatName').textContent = 'ID ' + targetChatId;
  }

  // Файлы
  let files = [];

  document.getElementById('fileInput').addEventListener('change', function(e) {
    const newFiles = Array.from(e.target.files);
    files = [...files, ...newFiles];
    renderPreviews();
    updateSendBtn();
    this.value = '';
  });

  function renderPreviews() {
    const grid = document.getElementById('previewGrid');
    const zone = document.getElementById('uploadZone');

    if (files.length === 0) {
      grid.style.display = 'none';
      zone.classList.remove('has-files');
      zone.innerHTML = `
        <div class="upload-icon">📸</div>
        <div class="upload-text">Добавить фото или видео</div>
        <div class="upload-sub">Нажмите чтобы выбрать файлы</div>
      `;
      return;
    }

    zone.classList.add('has-files');
    zone.innerHTML = `
      <div class="upload-icon">✅</div>
      <div class="upload-text">Файлов добавлено <span class="count-badge">${files.length}</span></div>
      <div class="upload-sub">Нажмите чтобы добавить ещё</div>
    `;

    grid.style.display = 'grid';
    grid.innerHTML = '';

    files.forEach((file, idx) => {
      const item = document.createElement('div');
      item.className = 'preview-item';
      const url = URL.createObjectURL(file);
      const isVideo = file.type.startsWith('video');
      item.innerHTML = `
        ${isVideo
          ? `<video src="${url}" style="width:100%;height:100%;object-fit:cover"></video>`
          : `<img src="${url}">`
        }
        <button class="remove-btn" onclick="removeFile(${idx})">✕</button>
        <div class="blur-badge">${document.getElementById('blurToggle').classList.contains('on') ? '🔒' : '🔓'}</div>
      `;
      grid.appendChild(item);
    });

    // Кнопка "добавить ещё"
    const addMore = document.createElement('div');
    addMore.className = 'add-more';
    addMore.textContent = '+';
    addMore.onclick = () => document.getElementById('fileInput').click();
    grid.appendChild(addMore);
  }

  function removeFile(idx) {
    files.splice(idx, 1);
    renderPreviews();
    updateSendBtn();
  }

  function toggleBlur() {
    const toggle = document.getElementById('blurToggle');
    const sliderRow = document.getElementById('blurSliderRow');
    toggle.classList.toggle('on');
    sliderRow.classList.toggle('visible', toggle.classList.contains('on'));
    renderPreviews();
  }

  function updateSendBtn() {
    const btn = document.getElementById('sendBtn');
    btn.disabled = files.length === 0;
  }

  async function sendContent() {
    const btn = document.getElementById('sendBtn');
    const price = document.getElementById('priceInput').value || 0;
    const caption = document.getElementById('captionInput').value || '';
    const blur = document.getElementById('blurToggle').classList.contains('on');
    const blurStrength = document.getElementById('blurSlider').value;

    if (!targetChatId) {
      showToast('⚠️ Нет chat_id');
      return;
    }
    if (!adminId) {
      showToast('⚠️ Нет admin_id');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span>Отправляю...</span>';

    try {
      // Отправляем каждый файл отдельно через multipart/form-data
      for (const file of files) {
        const formData = new FormData();
        formData.append('admin_id', adminId);
        formData.append('chat_id', targetChatId);
        formData.append('price', parseInt(price));
        formData.append('blur', blur ? 'true' : 'false');
        formData.append('blur_strength', parseInt(blurStrength));
        formData.append('caption', caption);
        formData.append('photo', file);

        const resp = await fetch(`${BOT_SERVER}/send`, {
          method: 'POST',
          body: formData
        });

        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || 'Server error');
      }

      showToast('✓ Отправлено!');
      files = [];
      renderPreviews();
      updateSendBtn();

    } catch (e) {
      showToast('❌ Ошибка: ' + e.message);
      console.error(e);
    }

    btn.disabled = files.length === 0;
    btn.innerHTML = '<span>Отправить в чат</span><span class="arrow">→</span>';
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
